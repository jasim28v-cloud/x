<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Homework | The Masterpiece</title>
    <style>
        :root {
            --accent: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
            --blur: blur(25px);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            overflow: hidden; background: #000;
            font-family: 'Inter', -apple-system, sans-serif;
            color: white;
        }

        /* حاوية التغذية الضخمة */
        .master-feed {
            height: 100vh; overflow-y: scroll;
            snap-type: y mandatory; scroll-behavior: smooth;
        }

        .video-section {
            height: 100vh; width: 100%; snap-align: start;
            position: relative; display: flex; align-items: center; justify-content: center;
        }

        /* عرض الفيديو السينمائي */
        .video-container {
            width: 100%; height: 100%;
            background: #000; position: relative;
        }

        video {
            width: 100%; height: 100%; object-fit: cover;
            opacity: 0; transition: opacity 1.2s ease-in-out;
        }

        video.active { opacity: 1; }

        /* الشعار والبيانات الفخمة (تصميم التايبوغراف الحديث) */
        .overlay-ui {
            position: absolute; bottom: 60px; right: 60px;
            z-index: 10; text-align: right; pointer-events: none;
        }

        .category-tag {
            font-size: 0.65rem; font-weight: 900; letter-spacing: 5px;
            color: var(--accent); text-transform: uppercase; margin-bottom: 10px;
            opacity: 0.6;
        }

        .project-title {
            font-size: clamp(2rem, 8vw, 4rem); font-weight: 100;
            line-height: 1; letter-spacing: -2px;
        }

        /* لودر البداية الفخم */
        #preloader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000; display: flex;
            align-items: center; justify-content: center; transition: 1.5s;
        }

        .loader-text { font-weight: 100; letter-spacing: 10px; font-size: 0.8rem; animation: pulse 2s infinite; }

        @keyframes pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        .master-feed::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="preloader">
        <div class="loader-text">STUDIO HOMEWORK / DISCOVERING ARCHIVE...</div>
    </div>

    <div class="master-feed" id="mainFeed"></div>

    <script>
        const CLOUD_NAME = "dssk5tabb";
        const SUFFIX = "_ypq1wb";
        const feed = document.getElementById('mainFeed');

        // أداة الفحص المتوازي لسرعة البرق
        async function buildInfiniteLibrary() {
            const maxVideos = 1000;
            const probes = [];

            // إرسال طلبات فحص لجميع المسارات المحتملة في وقت واحد
            for (let i = 1; i <= maxVideos; i++) {
                probes.push(checkVideo(i));
            }

            const activeVideos = await Promise.all(probes);
            
            activeVideos.filter(v => v !== null).forEach(video => {
                createSection(video.url, video.index);
            });

            // إخفاء اللودر بعد اكتمال الفحص
            document.getElementById('preloader').style.opacity = '0';
            setTimeout(() => document.getElementById('preloader').remove(), 1500);
        }

        async function checkVideo(index) {
            const id = `${index}${SUFFIX}`;
            const url = `https://res.cloudinary.com/${CLOUD_NAME}/video/upload/f_auto,q_auto/${id}.mp4`;
            
            try {
                const res = await fetch(url, { method: 'HEAD' });
                if (res.ok) return { url, index };
            } catch (e) {}
            return null;
        }

        function createSection(url, index) {
            const section = document.createElement('div');
            section.className = 'video-section';
            section.innerHTML = `
                <div class="video-container">
                    <video loop playsinline muted oncanplay="this.classList.add('active')">
                        <source src="${url}" type="video/mp4">
                    </video>
                    <div class="overlay-ui">
                        <div class="category-tag">DIGITAL ARCHIVE // NODE_${index}</div>
                        <div class="project-title">Composition ${index < 10 ? '0' + index : index}</div>
                    </div>
                </div>
            `;
            feed.appendChild(section);
            observer.observe(section);
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const video = entry.target.querySelector('video');
                if (entry.isIntersecting) {
                    video.play().catch(() => {});
                } else {
                    video.pause();
                }
            });
        }, { threshold: 0.6 });

        // تفعيل الصوت عند أول تفاعل
        document.addEventListener('click', () => {
            document.querySelectorAll('video').forEach(v => v.muted = false);
        }, { once: true });

        buildInfiniteLibrary();
    </script>
</body>
</html>
