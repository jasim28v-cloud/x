<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EMPIRE OS | V99 SHADOW CORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');

        :root { 
            --neon: #00f3ff; 
            --bg-deep: #050505;
            --glass: rgba(0, 0, 0, 0.8);
        }

        body, html { 
            margin: 0; padding: 0; background: var(--bg-deep); color: #fff; 
            overflow: hidden; font-family: 'Rajdhani', sans-serif;
            height: 100%; width: 100%;
        }

        /* V99 SCROLL ENGINE */
        .main-scroller { 
            height: 100vh; width: 100vw;
            overflow-y: scroll; scroll-snap-type: y mandatory; 
            scrollbar-width: none; scroll-behavior: smooth;
        }
        .main-scroller::-webkit-scrollbar { display: none; }

        .video-section { 
            height: 100vh; width: 100vw; scroll-snap-align: start; 
            position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;
        }

        /* CORE VIDEO ENGINE */
        .video-bg { position: absolute; inset: 0; z-index: 1; transition: 1.2s transform cubic-bezier(0.1, 0.8, 0.1, 1); }
        video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.35) contrast(1.15) saturate(0.8); }
        
        /* HUD UI FRAME */
        .hud-overlay {
            position: absolute; inset: 20px; border: 1px solid rgba(0, 243, 255, 0.05);
            pointer-events: none; z-index: 10; border-radius: 15px;
        }
        .corner { position: absolute; width: 30px; height: 30px; border: 2px solid var(--neon); filter: drop-shadow(0 0 10px var(--neon)); opacity: 0.4; }
        .t-l { top: -1px; left: -1px; border-right: 0; border-bottom: 0; border-radius: 15px 0 0 0; }
        .b-r { bottom: -1px; right: -1px; border-left: 0; border-top: 0; border-radius: 0 0 15px 0; }

        /* INFORMATION PANEL */
        .info-panel {
            position: absolute; bottom: 80px; left: 50px; z-index: 100;
            max-width: 80%; pointer-events: none; text-align: left;
        }
        .node-tag {
            background: rgba(0, 243, 255, 0.1); border-left: 3px solid var(--neon);
            color: var(--neon); padding: 4px 12px; font-size: 10px;
            letter-spacing: 5px; font-family: 'Orbitron'; margin-bottom: 15px; display: inline-block;
        }
        .main-title {
            font-family: 'Orbitron'; font-weight: 900; font-size: clamp(2.5rem, 10vw, 6rem);
            line-height: 0.85; text-transform: uppercase; letter-spacing: -2px;
            background: linear-gradient(to bottom, #fff 30%, #444 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* V99 SYSTEM LOADER */
        #loader {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .scanline { width: 100%; height: 1px; background: var(--neon); position: absolute; top: 0; opacity: 0.2; animation: scan 4s linear infinite; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="scanline"></div>
        <div class="text-cyan-400 font-black tracking-[12px] animate-pulse text-[11px] mb-4" style="font-family: 'Orbitron';">BOOTING_SHΔDØW_CORE</div>
        <div class="w-40 h-[1px] bg-white/10 relative overflow-hidden">
            <div class="absolute inset-0 bg-cyan-500 w-full animate-[loading_1.5s_infinite]"></div>
        </div>
    </div>

    <header class="fixed top-0 w-full z-[1000] p-10 flex justify-between items-start pointer-events-none">
        <div class="flex items-center gap-6">
            <div class="w-1 h-14 bg-cyan-400 shadow-[0_0_15px_#00f3ff]"></div>
            <div>
                <h1 class="font-black text-2xl tracking-tighter" style="font-family: 'Orbitron';">EMPIRE<span class="text-cyan-400">.V99</span></h1>
                <div id="live-clock" class="text-[9px] text-white/30 tracking-[4px] mt-1">00:00:00 // SECURE_UPLINK</div>
            </div>
        </div>
        <div class="text-right">
            <div class="px-4 py-1 border border-cyan-500/20 rounded bg-black/60 text-[9px] text-cyan-400 uppercase tracking-[4px]">Archive Mode 2027</div>
        </div>
    </header>

    <main class="main-scroller" id="content-engine"></main>

    <script>
        const cloudID = "dssk5tabb";
        const engine = document.getElementById('content-engine');
        
        // --- AUTO-SEQUENCE GENERATOR ---
        const config = { start: 22, end: 37, suffix: "_ypq1wb" };

        for (let i = config.start; i <= config.end; i++) {
            const assetID = `${i}${config.suffix}`;
            const section = document.createElement('section');
            section.className = 'video-section';
            section.innerHTML = `
                <div class="hud-overlay">
                    <div class="corner t-l"></div>
                    <div class="corner b-r"></div>
                </div>
                <div class="video-bg">
                    <video loop playsinline muted preload="auto">
                        <source src="https://res.cloudinary.com/${cloudID}/video/upload/q_auto,f_auto/${assetID}.mp4" type="video/mp4">
                    </video>
                </div>
                <div class="info-panel">
                    <div class="node-tag">NODE_DATA_${i}</div>
                    <h2 class="main-title">SHADOW<br>ARCHIVE</h2>
                    <p class="text-white/20 text-[8px] mt-6 tracking-[6px] uppercase font-bold">Uplink: SSL_ENCRYPTED_${assetID}</p>
                </div>
            `;
            engine.appendChild(section);
        }

        // --- SYSTEM INITIALIZATION ---
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.transition = '1s opacity';
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 1000);
            }, 2500);
            initObserver();
        });

        function initObserver() {
            const options = { threshold: 0.6 };
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    const bg = entry.target.querySelector('.video-bg');
                    if (entry.isIntersecting) {
                        video.play();
                        bg.style.transform = "scale(1)";
                    } else {
                        video.pause();
                        bg.style.transform = "scale(1.1)";
                    }
                });
            }, options);
            document.querySelectorAll('.video-section').forEach(s => observer.observe(s));
        }

        // --- CLOCK ENGINE ---
        setInterval(() => {
            const d = new Date();
            document.getElementById('live-clock').innerText = 
                d.getHours().toString().padStart(2, '0') + ":" + 
                d.getMinutes().toString().padStart(2, '0') + ":" + 
                d.getSeconds().toString().padStart(2, '0') + " // SYSTEM_READY";
        }, 1000);

        // --- AUDIO UNLOCK ---
        window.onclick = () => { 
            document.querySelectorAll('video').forEach(v => v.muted = false);
        };
    </script>
</body>
</html>
