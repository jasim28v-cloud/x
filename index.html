<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STUDIO HOMEWORK | PINK EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');

        :root { 
            --pink-neon: #ff007f; 
            --pink-glow: rgba(255, 0, 127, 0.4);
        }

        body, html { 
            margin: 0; padding: 0; background: #050002; color: #fff; 
            overflow: hidden; font-family: 'Rajdhani', sans-serif;
            height: 100%; width: 100%;
        }

        .main-scroller { 
            height: 100vh; width: 100vw;
            overflow-y: scroll; scroll-snap-type: y mandatory; 
            scrollbar-width: none; scroll-behavior: smooth;
        }
        .main-scroller::-webkit-scrollbar { display: none; }

        .video-section { 
            height: 100vh; width: 100vw; scroll-snap-align: start; 
            position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;
        }

        /* عرض الفيديو بالكامل بدون قص */
        video { width: 100%; height: 100%; object-fit: contain; filter: brightness(0.8) contrast(1.1); transition: 1s; }

        /* واجهة HUD الوردية */
        .hud-overlay {
            position: absolute; inset: 25px; border: 1px solid rgba(255, 0, 127, 0.15);
            pointer-events: none; z-index: 10; border-radius: 20px;
        }
        .corner { position: absolute; width: 35px; height: 35px; border: 3px solid var(--pink-neon); filter: drop-shadow(0 0 12px var(--pink-neon)); }
        .t-l { top: -2px; left: -2px; border-right: 0; border-bottom: 0; border-radius: 15px 0 0 0; }
        .b-r { bottom: -2px; right: -2px; border-left: 0; border-top: 0; border-radius: 0 0 15px 0; }

        /* النصوص والمعلومات */
        .info-panel {
            position: absolute; bottom: 60px; left: 40px; z-index: 100;
            max-width: 85%; pointer-events: none;
        }
        .node-tag {
            background: rgba(255, 0, 127, 0.1); border-left: 3px solid var(--pink-neon);
            color: var(--pink-neon); padding: 5px 15px; font-size: 10px;
            letter-spacing: 4px; font-family: 'Orbitron'; margin-bottom: 20px; display: inline-block;
        }
        .main-title {
            font-family: 'Orbitron'; font-weight: 900; font-size: clamp(2.5rem, 10vw, 5.5rem);
            line-height: 0.85; text-transform: uppercase; letter-spacing: -2px;
            background: linear-gradient(to bottom, #fff, var(--pink-neon));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px var(--pink-glow));
        }

        /* شاشة التحميل الوردية */
        #loader {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .loading-bar { width: 180px; height: 2px; background: rgba(255,0,127,0.1); position: relative; margin-top: 20px; }
        .loading-progress { position: absolute; top: 0; left: 0; height: 100%; background: var(--pink-neon); animation: sync 2s infinite; }

        @keyframes sync { 0% { width: 0%; left: 0; } 50% { width: 100%; left: 0; } 100% { width: 0%; left: 100%; } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="text-pink-500 font-black tracking-[10px] animate-pulse text-[10px]" style="font-family: 'Orbitron';">SYNCING_PINK_STUDIO</div>
        <div class="loading-bar"><div class="loading-progress"></div></div>
    </div>

    <header class="fixed top-0 w-full z-[1000] p-10 flex justify-between items-start pointer-events-none">
        <div class="flex items-center gap-6">
            <div class="w-1 h-16 bg-pink-500 shadow-[0_0_15px_#ff007f]"></div>
            <div>
                <h1 class="font-black text-3xl tracking-tighter" style="font-family: 'Orbitron';">STUDIO<span class="text-pink-500">.HW</span></h1>
                <div class="text-[9px] text-white/40 tracking-[6px] mt-1 uppercase">Pink Archive // Active</div>
            </div>
        </div>
    </header>

    <main class="main-scroller" id="content-engine"></main>

    <script>
        const cloudID = "dssk5tabb";
        
        // القائمة الجديدة التي أرسلتها أنت
        const videoArchive = [
            "homework3_e2fj", "homework4_zito", "homework5_eyb", 
            "homework6_gst", "homework7_rgut", "homework8_bd", 
            "homework9_tno", "homework_v2_ja", "homework_v3_z", 
            "29_ypq1wb", "homework10_r", "homework11_w", 
            "homework12_yof", "homework13_ox", "homework14_nl", 
            "homework15_k2", "homework1_pqiu", "homework2_ye4"
        ];

        const engine = document.getElementById('content-engine');

        videoArchive.forEach((id, index) => {
            const section = document.createElement('section');
            section.className = 'video-section';
            section.innerHTML = `
                <div class="hud-overlay"><div class="corner t-l"></div><div class="corner b-r"></div></div>
                <video loop playsinline muted src="https://res.cloudinary.com/${cloudID}/video/upload/q_auto,f_auto/${id}.mp4"></video>
                <div class="info-panel">
                    <div class="node-tag">NODE_PINK_0${index + 1}</div>
                    <h2 class="main-title">HOMEWORK<br>STUDIO</h2>
                    <p class="text-white/20 text-[8px] mt-6 tracking-[6px] uppercase font-bold italic">Node_ID: ${id}</p>
                </div>
            `;
            engine.appendChild(section);
        });

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 800);
            }, 1500);
            startObserver();
        });

        function startObserver() {
            const obs = new IntersectionObserver((entries) => {
                entries.forEach(e => {
                    const vid = e.target.querySelector('video');
                    if (e.isIntersecting) vid.play();
                    else { vid.pause(); vid.currentTime = 0; }
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('.video-section').forEach(s => obs.observe(s));
        }

        window.onclick = () => { document.querySelectorAll('video').forEach(v => v.muted = false); };
    </script>
</body>
</html>
