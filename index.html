<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Homework | الذكاء الاستكشافي</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #00f2ea;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            overflow: hidden; background: #000;
            font-family: 'Inter', sans-serif; color: white;
        }

        /* حاوية التمرير اللانهائي */
        .feed {
            height: 100vh; overflow-y: scroll;
            snap-type: y mandatory; scroll-behavior: smooth;
        }

        .video-card {
            height: 100vh; width: 100%; snap-align: start;
            position: relative; display: flex; align-items: center; justify-content: center;
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        /* لوحة المعلومات الذكية */
        .smart-info {
            position: absolute; bottom: 50px; right: 50px;
            background: var(--glass); backdrop-filter: blur(30px);
            padding: 25px; border-radius: 20px; border: 1px solid var(--border);
            z-index: 10; min-width: 250px;
        }

        .index-number {
            font-size: 0.7rem; color: var(--accent);
            letter-spacing: 3px; font-weight: bold;
        }

        .video-name {
            font-size: 1.3rem; font-weight: 200; margin-top: 5px;
            text-transform: capitalize;
        }

        /* لودر التحميل */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; items-content: center;
            justify-content: center; z-index: 1000; transition: 1s;
        }

        .feed::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="loader">جاري استكشاف الفيديوهات في حسابك...</div>

    <div class="feed" id="mainFeed"></div>

    <script>
        // إعدادات المحرك
        const cloudName = "dssk5tabb";
        const tagToSearch = "_ypq1wb"; // سيبحث عن أي فيديو يحتوي اسمه أو الوسم الخاص به على هذا النص

        async function startDiscovery() {
            // ملاحظة: Cloudinary تتيح جلب قائمة بصيغة JSON للوسوم (Tags)
            // ستحتاج لإضافة الوسم "_ypq1wb" للفيديوهات في لوحة التحكم
            const apiUrl = `https://res.cloudinary.com/${cloudName}/video/list/${tagToSearch}.json`;

            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error("تأكد من تفعيل Resource List في إعدادات الأمن");
                
                const data = await response.json();
                const feed = document.getElementById('mainFeed');

                // ترتيب الفيديوهات حسب تاريخ الرفع (الأحدث أولاً)
                data.resources.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

                data.resources.forEach((res, index) => {
                    const videoUrl = `https://res.cloudinary.com/${cloudName}/video/upload/f_auto,q_auto/${res.public_id}.${res.format}`;
                    
                    const card = document.createElement('div');
                    card.className = 'video-card';
                    card.innerHTML = `
                        <video loop playsinline muted>
                            <source src="${videoUrl}" type="video/mp4">
                        </video>
                        <div class="smart-info">
                            <div class="index-number">فيديو رقم ${index + 1}</div>
                            <div class="video-name">${res.public_id.replace(tagToSearch, '').replace(/_/g, ' ')}</div>
                            <div style="font-size: 0.6rem; opacity: 0.5; margin-top: 10px;">
                                تم الرفع: ${new Date(res.created_at).toLocaleDateString('ar-EG')}
                            </div>
                        </div>
                    `;
                    feed.appendChild(card);
                });

                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').remove(), 1000);
                
                initObserver();

            } catch (error) {
                document.getElementById('loader').innerHTML = "خطأ: تأكد من تفعيل ميزة (Resource List) في إعدادات Cloudinary";
                console.error(error);
            }
        }

        function initObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if (entry.isIntersecting) {
                        video.play().catch(() => {});
                    } else {
                        video.pause();
                    }
                });
            }, { threshold: 0.6 });

            document.querySelectorAll('.video-card').forEach(card => observer.observe(card));
        }

        // كتم/تشغيل الصوت
        document.addEventListener('click', () => {
            document.querySelectorAll('video').forEach(v => v.muted = false);
        }, { once: true });

        window.onload = startDiscovery;
    </script>
</body>
</html>
