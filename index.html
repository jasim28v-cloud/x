<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Homework | Dynamic Masterpiece</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.12);
            --dynamic-color: #00f2ea; /* اللون الافتراضي */
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            overflow: hidden; background: #000;
            font-family: 'Inter', system-ui, sans-serif;
            transition: background 1.5s ease;
        }

        /* الخلفية الديناميكية المتغيرة */
        #bg-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 20% 30%, var(--dynamic-color), transparent 40%),
                        radial-gradient(circle at 80% 70%, #000, transparent 50%);
            filter: blur(80px);
            opacity: 0.4;
            transition: all 1.5s ease;
        }

        /* الشعار الإبداعي */
        .header {
            position: fixed; top: 40px; right: 40px; z-index: 100;
            text-align: right; border-right: 2px solid var(--dynamic-color);
            padding-right: 20px; transition: border 1s ease;
        }

        .logo-main { font-size: 1.8rem; font-weight: 900; letter-spacing: 4px; color: white; }
        .logo-sub { font-size: 0.7rem; opacity: 0.5; letter-spacing: 2px; color: white; }

        /* حاوية الفيديوهات */
        .feed {
            height: 100vh; overflow-y: scroll;
            snap-type: y mandatory; scroll-behavior: smooth;
        }

        .video-card {
            height: 100vh; width: 100%; snap-align: start;
            position: relative; display: flex; align-items: center; justify-content: center;
        }

        /* إطار الفيديو السينمائي */
        .video-frame {
            width: 80%; height: 80%; border-radius: 40px;
            overflow: hidden; position: relative;
            border: 1px solid var(--border);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            transform: scale(0.95); transition: 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .video-card.active .video-frame { transform: scale(1); box-shadow: 0 0 100px var(--dynamic-color); }

        video { width: 100%; height: 100%; object-fit: cover; }

        /* الوصف الزجاجي المتفاعل */
        .glass-box {
            position: absolute; bottom: 8%; left: 8%;
            background: var(--glass); backdrop-filter: blur(30px);
            border: 1px solid var(--border); border-radius: 25px;
            padding: 30px; width: 280px; color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .nav-sidebar {
            position: absolute; right: 40px; bottom: 8%;
            display: flex; flex-direction: column; gap: 20px;
        }

        .nav-btn {
            width: 60px; height: 60px; border-radius: 20px;
            background: var(--glass); border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; color: white; font-size: 20px;
        }

        .nav-btn:hover { background: white; color: black; transform: translateY(-5px); }

        .feed::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="bg-canvas"></div>

    <div class="header">
        <div class="logo-main">STUDIO</div>
        <div class="logo-sub">HOMEWORK / CREATIVE NODE</div>
    </div>

    <div class="feed" id="mainFeed"></div>

    <script>
        const cloudName = "dssk5tabb";
        const tag = "_ypq1wb";
        const colors = ['#ff0055', '#00f2ea', '#7000ff', '#ffaa00', '#00ff44']; // مصفوفة ألوان إبداعية

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const video = entry.target.querySelector('video');
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                    video.play();
                    // تغيير لون الموقع بناءً على ترتيب الفيديو
                    const colorIndex = entry.target.dataset.index % colors.length;
                    document.documentElement.style.setProperty('--dynamic-color', colors[colorIndex]);
                } else {
                    entry.target.classList.remove('active');
                    video.pause();
                }
            });
        }, { threshold: 0.7 });

        async function buildFeed() {
            let i = 1;
            while (i <= 20) {
                const publicId = `${i}${tag}`;
                const videoUrl = `https://res.cloudinary.com/${cloudName}/video/upload/f_auto,q_auto/${publicId}`;

                try {
                    const check = await fetch(videoUrl, { method: 'HEAD' });
                    if (!check.ok) break;

                    const section = document.createElement('div');
                    section.className = 'video-card';
                    section.dataset.index = i;
                    section.innerHTML = `
                        <div class="video-frame">
                            <video loop playsinline muted>
                                <source src="${videoUrl}" type="video/mp4">
                            </video>
                        </div>
                        <div class="glass-box">
                            <div style="font-size: 0.7rem; letter-spacing: 3px; margin-bottom: 10px; opacity: 0.6;">COLLECTION ITEM</div>
                            <div style="font-size: 1.4rem; font-weight: 200;">Piece #${i}</div>
                        </div>
                        <div class="nav-sidebar">
                            <div class="nav-btn">❤️</div>
                            <div class="nav-btn" onclick="window.open('${videoUrl}', '_blank')">📥</div>
                        </div>
                    `;
                    document.getElementById('mainFeed').appendChild(section);
                    observer.observe(section);
                    i++;
                } catch (e) { break; }
            }
        }

        document.addEventListener('click', () => {
            document.querySelectorAll('video').forEach(v => v.muted = false);
        }, { once: true });

        buildFeed();
    </script>
</body>
</html>
