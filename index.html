<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STUDIO HOMEWORK | PINK EMPIRE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap');
        
        :root { --pink: #ff007f; }
        
        body { background: #050002; color: #fff; overflow: hidden; font-family: 'Rajdhani', sans-serif; margin: 0; }
        .app-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .app-container::-webkit-scrollbar { display: none; }
        
        .video-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; overflow: hidden; background: #000; display: flex; align-items: center; justify-content: center; }
        
        /* جعل الفيديو يظهر كاملاً وبوضوح عالي كما طلبت */
        video { width: 100%; height: 100%; object-fit: contain; filter: brightness(0.9); }
        
        .hud-frame { position: absolute; inset: 20px; border: 1px solid rgba(255, 0, 127, 0.15); pointer-events: none; z-index: 10; border-radius: 15px; }
        .corner { position: absolute; width: 30px; height: 30px; border: 2px solid var(--pink); filter: drop-shadow(0 0 8px var(--pink)); }
        .tl { top: -1px; left: -1px; border-right: 0; border-bottom: 0; }
        .br { bottom: -1px; right: -1px; border-left: 0; border-top: 0; }

        .pink-title { font-family: 'Orbitron'; font-weight: 900; font-size: 10vw; line-height: 0.8; text-transform: uppercase; background: linear-gradient(to bottom, #fff, var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px rgba(255,0,127,0.4)); }
        
        #loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="text-pink-500 font-bold tracking-[10px] animate-pulse mb-4 text-[10px]" style="font-family: 'Orbitron';">BOOTING_PINK_STUDIO</div>
        <div class="w-40 h-[1px] bg-white/10 overflow-hidden"><div class="h-full bg-pink-500 animate-[load_2s_infinite]"></div></div>
    </div>

    <main class="app-container" id="engine"></main>

    <script>
        const cloudName = "dssk5tabb";
        
        // القائمة التي أرسلتها (تأكد من مطابقتها تماماً لما في الموقع)
        const videoList = [
            "homework3_e2fj", "homework4_zito", "homework5_eyb", 
            "homework6_gst", "homework7_rgut", "homework8_bd", 
            "homework9_tno", "homework_v2_ja", "homework_v3_z", 
            "29_ypq1wb", "homework10_r", "homework11_w", 
            "homework12_yof", "homework13_ox", "homework14_nl", 
            "homework15_k2", "homework1_pqiu", "homework2_ye4"
        ];

        const container = document.getElementById('engine');

        videoList.forEach((id) => {
            const section = document.createElement('section');
            section.className = 'video-card';
            section.innerHTML = `
                <div class="hud-frame"><div class="corner tl"></div><div class="corner br"></div></div>
                <video loop playsinline muted src="https://res.cloudinary.com/${cloudName}/video/upload/q_auto,f_auto/${id}.mp4"></video>
                <div class="absolute bottom-20 right-10 z-[100] text-left pointer-events-none">
                    <div class="text-pink-400 text-[8px] tracking-[4px] mb-2 font-bold uppercase italic">Node: ${id}</div>
                    <h2 class="pink-title">STUDIO<br>HOMEWORK</h2>
                </div>
            `;
            container.appendChild(section);
        });

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
            }, 1000);
        });

        const obs = new IntersectionObserver((entries) => {
            entries.forEach(e => {
                const v = e.target.querySelector('video');
                if (e.isIntersecting) v.play();
                else { v.pause(); v.currentTime = 0; }
            });
        }, { threshold: 0.6 });

        document.querySelectorAll('.video-card').forEach(c => obs.observe(c));
        window.onclick = () => { document.querySelectorAll('video').forEach(v => v.muted = false); };
    </script>
    <style>@keyframes load { 0% { left: -100%; width: 50%; } 100% { left: 100%; width: 50%; } }</style>
</body>
</html>
