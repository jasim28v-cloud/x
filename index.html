<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Homework | المشرع الإبداعي</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
            --dynamic-color: #00f2ea;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            overflow: hidden; background: #000;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        /* تأثير الخلفية المتغيرة */
        #bg-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.3; filter: blur(100px);
            background: radial-gradient(circle at center, var(--dynamic-color), #000);
            transition: 1.5s ease;
        }

        /* الشعار الزجاجي */
        .modern-logo {
            position: fixed; top: 30px; right: 30px; z-index: 100;
            background: var(--glass); backdrop-filter: blur(20px);
            padding: 12px 25px; border-radius: 15px;
            border: 1px solid var(--border);
            color: white; letter-spacing: 3px; font-weight: 200;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        /* حاوية الفيديوهات (نمط تيك توك) */
        .feed {
            height: 100vh; overflow-y: scroll;
            snap-type: y mandatory; scroll-behavior: smooth;
        }

        .video-card {
            height: 100vh; width: 100%; snap-align: start;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }

        .video-frame {
            width: 85%; height: 85%; border-radius: 35px;
            overflow: hidden; border: 1px solid var(--border);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            transform: scale(0.95); transition: 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .active .video-frame { transform: scale(1); border-color: var(--dynamic-color); }

        video { width: 100%; height: 100%; object-fit: cover; background: #050505; }

        /* الوصف الزجاجي السفلي */
        .info-panel {
            position: absolute; bottom: 10%; right: 10%;
            background: var(--glass); backdrop-filter: blur(30px);
            padding: 25px; border-radius: 20px; border: 1px solid var(--border);
            color: white; max-width: 250px;
        }

        .feed::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="bg-canvas"></div>
    <div class="modern-logo">STUDIO HOMEWORK</div>

    <div class="feed" id="mainFeed">
        </div>

    <script>
        const config = {
            cloudName: "dssk5tabb",
            tag: "_ypq1wb",
            colors: ['#00f2ea', '#ff0055', '#7000ff', '#00ff44'],
            total: 15 // غير هذا الرقم لعدد فيديوهاتك الحالية
        };

        function buildFeed() {
            const container = document.getElementById('mainFeed');
            for (let i = 1; i <= config.total; i++) {
                const publicId = `${i}${config.tag}`;
                const url = `https://res.cloudinary.com/${config.cloudName}/video/upload/f_auto,q_auto/${publicId}.mp4`;

                const section = document.createElement('div');
                section.className = 'video-card';
                section.dataset.index = i;
                section.innerHTML = `
                    <div class="video-frame">
                        <video loop playsinline muted>
                            <source src="${url}" type="video/mp4">
                        </video>
                    </div>
                    <div class="info-panel">
                        <div style="font-size: 0.7rem; color: var(--dynamic-color); margin-bottom: 5px;">COLLECTION NODE</div>
                        <div style="font-size: 1.1rem; font-weight: 300;">Visual Composition #${i}</div>
                    </div>
                `;
                container.appendChild(section);
            }
            startObserver();
        }

        function startObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                        video.play().catch(() => {});
                        // تغيير اللون الديناميكي
                        const color = config.colors[entry.target.dataset.index % config.colors.length];
                        document.documentElement.style.setProperty('--dynamic-color', color);
                    } else {
                        entry.target.classList.remove('active');
                        video.pause();
                    }
                });
            }, { threshold: 0.7 });

            document.querySelectorAll('.video-card').forEach(card => observer.observe(card));
        }

        // تحرير الصوت عند أول لمسة للمستخدم
        document.addEventListener('click', () => {
            document.querySelectorAll('video').forEach(v => v.muted = false);
        }, { once: true });

        buildFeed();
    </script>
</body>
</html>
