<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA VIDEO HUB | DSSK5TABB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        
        body { 
            background-color: #030712; 
            color: #f8fafc; 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .hero-title {
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .video-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .video-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: #60a5fa;
            box-shadow: 0 20px 50px rgba(59, 130, 246, 0.2);
        }

        .player-wrapper video {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            border-radius: 12px 12px 0 0;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #030712; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body>

    <nav class="flex justify-between items-center px-10 py-6 border-b border-white/5 sticky top-0 bg-[#030712]/80 backdrop-blur-xl z-50">
        <div class="flex items-center gap-3">
            <div class="h-10 w-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/30">
                <i class="fas fa-bolt text-white"></i>
            </div>
            <span class="hero-title text-xl font-bold tracking-widest uppercase">Elite Stream</span>
        </div>
        <div class="flex gap-8 text-xs font-semibold tracking-tighter uppercase text-gray-400">
            <a href="#" class="hover:text-blue-400 transition">Library</a>
            <a href="#" class="hover:text-blue-400 transition">Cloudinary</a>
            <a href="#" class="hover:text-blue-400 transition">API: Connected</a>
        </div>
    </nav>

    <section class="py-20 text-center">
        <h2 class="hero-title text-6xl md:text-8xl font-black mb-6">UNLIMITED <br> EXPERIENCE</h2>
        <p class="text-gray-500 max-w-2xl mx-auto text-lg font-light leading-relaxed">
            Streaming professional assets directly from <span class="text-blue-400 font-bold">dssk5tabb</span> secure cloud nodes.
        </p>
    </section>

    <main class="container mx-auto px-6 pb-40">
        <div id="mainGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-10">
            </div>
    </main>

    <footer class="py-20 border-t border-white/5 text-center text-gray-600">
        <p class="text-xs uppercase tracking-[0.5em]">&copy; 2026 DIGITAL ARCHIVE SYSTEM</p>
    </footer>

    <script>
        const CLOUD_NAME = "dssk5tabb";
        // Your specific list from 22 to 37
        const videoList = [
            "22_ypq1wb", "23_ypq1wb", "24_ypq1wb", "25_ypq1wb", "26_ypq1wb",
            "27_ypq1wb", "28_ypq1wb", "29_ypq1wb", "30_ypq1wb", "31_ypq1wb",
            "32_ypq1wb", "33_ypq1wb", "34_ypq1wb", "35_ypq1wb", "36_ypq1wb", "37_ypq1wb"
        ];

        const mainGrid = document.getElementById('mainGrid');

        videoList.forEach((id, index) => {
            const videoUrl = `https://res.cloudinary.com/${CLOUD_NAME}/video/upload/${id}.mp4`;
            const posterUrl = `https://res.cloudinary.com/${CLOUD_NAME}/video/upload/${id}.jpg`;
            
            const card = `
                <div class="video-card rounded-3xl overflow-hidden group">
                    <div class="player-wrapper relative">
                        <video controls poster="${posterUrl}" preload="none">
                            <source src="${videoUrl}" type="video/mp4">
                        </video>
                        <div class="absolute top-4 right-4 bg-black/60 backdrop-blur-md px-3 py-1 rounded-full text-[10px] font-bold text-blue-400">
                            PART ${index + 22}
                        </div>
                    </div>
                    <div class="p-6">
                        <h3 class="text-sm font-bold text-gray-200 uppercase tracking-widest mb-1">${id}</h3>
                        <p class="text-[10px] text-gray-500 font-mono">ENCODED: H.264 / 4K READY</p>
                        <div class="mt-6 flex items-center justify-between">
                            <button onclick="window.open('${videoUrl}')" class="text-xs font-bold text-blue-400 hover:text-white transition uppercase">Direct Link</button>
                            <div class="flex gap-2">
                                <div class="h-1.5 w-1.5 rounded-full bg-blue-500 shadow-[0_0_8px_#3b82f6]"></div>
                                <div class="h-1.5 w-1.5 rounded-full bg-gray-700"></div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            mainGrid.innerHTML += card;
        });
    </script>
</body>
</html>
