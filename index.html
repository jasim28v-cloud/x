<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS REELS | TIKTOK STYLE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Plus+Jakarta+Sans:wght@300;700&display=swap');

        body, html {
            margin: 0; padding: 0;
            background: #000;
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100%;
            overflow: hidden;
        }

        /* Snap Scrolling Container */
        .feed-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        .video-section {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #050505;
        }

        video {
            height: 100%;
            width: 100%;
            object-fit: cover; /* Vertical Full Screen like TikTok */
            filter: brightness(0.9);
        }

        /* Glassmorphism Overlays */
        .overlay-ui {
            position: absolute;
            bottom: 40px;
            left: 20px;
            right: 80px;
            z-index: 10;
        }

        .side-actions {
            position: absolute;
            right: 15px;
            bottom: 100px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            z-index: 10;
        }

        .glass-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: 0.3s;
        }

        .glass-btn:hover {
            background: #3b82f6;
            transform: scale(1.1);
        }

        .orbitron { font-family: 'Orbitron', sans-serif; }

        .video-info {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            padding: 15px;
            border-radius: 20px;
            border-left: 3px solid #3b82f6;
        }

        /* Hide Scrollbar */
        .feed-container::-webkit-scrollbar { display: none; }

        .search-nav {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            width: 90%;
            max-width: 400px;
        }
    </style>
</head>
<body>

    <div class="search-nav">
        <div class="relative">
            <input type="text" id="idSearch" placeholder="JUMP TO #ID (001-099)..." 
                   class="w-full bg-black/40 backdrop-blur-xl border border-white/10 rounded-full py-3 px-12 text-[10px] orbitron tracking-[0.2em] outline-none focus:border-blue-500 transition-all uppercase">
            <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-gray-500"></i>
        </div>
    </div>

    <div id="videoFeed" class="feed-container">
        </div>

    <script>
        const CLOUD_NAME = "dssk5tabb";
        
        // Generate IDs 001_ypq1wb to 099_ypq1wb
        const createSequence = () => {
            let data = [];
            for (let i = 1; i <= 99; i++) {
                let idNum = i.toString().padStart(3, '0');
                data.push(`${idNum}_ypq1wb`);
            }
            return data;
        };

        const vaultData = createSequence();
        const feed = document.getElementById('videoFeed');
        const searchInput = document.getElementById('idSearch');

        function renderFeed(items) {
            feed.innerHTML = items.map(id => {
                const stream = `https://res.cloudinary.com/${CLOUD_NAME}/video/upload/${id}.mp4`;
                const poster = `https://res.cloudinary.com/${CLOUD_NAME}/video/upload/${id}.jpg`;
                const idx = id.split('_')[0];

                return `
                <section class="video-section" id="section-${idx}">
                    <video loop playsinline preload="none" poster="${poster}" onclick="this.paused ? this.play() : this.pause()">
                        <source src="${stream}" type="video/mp4">
                    </video>

                    <div class="side-actions">
                        <div class="glass-btn"><i class="fas fa-heart text-white"></i></div>
                        <div class="glass-btn"><i class="fas fa-comment-dots text-white"></i></div>
                        <div class="glass-btn" onclick="window.open('${stream}')"><i class="fas fa-download text-white"></i></div>
                        <div class="glass-btn"><i class="fas fa-share-alt text-white"></i></div>
                    </div>

                    <div class="overlay-ui">
                        <div class="video-info">
                            <h2 class="orbitron text-sm font-black mb-1 tracking-widest text-blue-400">NODE_ID: ${idx}</h2>
                            <p class="text-[10px] text-gray-300 font-light tracking-wide italic">Filename: ${id}</p>
                        </div>
                    </div>
                </section>
                `;
            }).join('');
        }

        // Search to jump to video
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const val = e.target.value.padStart(3, '0');
                const element = document.getElementById(`section-${val}`);
                if (element) {
                    element.scrollIntoView({ behavior: 'smooth' });
                }
            }
        });

        renderFeed(vaultData);

        // Auto-Play Logic (Plays video when it's in view)
        const observerOptions = { threshold: 0.6 };
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const video = entry.target.querySelector('video');
                if (entry.isIntersecting) {
                    video.play();
                } else {
                    video.pause();
                }
            });
        }, observerOptions);

        document.querySelectorAll('.video-section').forEach(section => observer.observe(section));
    </script>
</body>
</html>
