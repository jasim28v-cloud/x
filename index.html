<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER PINK | THE ULTIMATE CRYSTAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Plus+Jakarta+Sans:wght@200;800&display=swap');

        :root {
            --pink-neon: #ff007f;
            --glass-core: rgba(255, 0, 127, 0.03);
            --border-glow: rgba(255, 0, 127, 0.3);
        }

        body, html {
            margin: 0; padding: 0;
            background: #000;
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        /* Snap Engine */
        .scroller {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }
        .scroller::-webkit-scrollbar { display: none; }

        .node-section {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Video Treatment */
        video {
            height: 100%;
            width: 100%;
            object-fit: cover;
            filter: saturate(1.2) brightness(0.7);
            transition: 1s;
        }

        /* Premium Luxury Frame */
        .frame-glow {
            position: absolute;
            inset: 20px;
            border: 1px solid var(--border-glow);
            border-radius: 40px;
            pointer-events: none;
            box-shadow: inset 0 0 50px rgba(255, 0, 127, 0.1);
            z-index: 10;
        }

        /* Glass Floating UI */
        .luxury-info {
            position: absolute;
            bottom: 60px;
            left: 45px;
            z-index: 20;
            padding: 30px;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(40px);
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 300px;
        }

        .side-icons {
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 35px;
            z-index: 30;
        }

        .crystal-btn {
            width: 60px;
            height: 60px;
            background: var(--glass-core);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-glow);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #fff;
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            cursor: pointer;
        }

        .crystal-btn:hover {
            background: var(--pink-neon);
            box-shadow: 0 0 30px var(--pink-neon);
            transform: scale(1.1) rotate(5deg);
        }

        .syncopate { font-family: 'Syncopate', sans-serif; }

        /* Navigation Bar */
        .top-nav {
            position: fixed;
            top: 40px;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 100;
        }

        .search-capsule {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 40px;
            border-radius: 100px;
            width: 320px;
            text-align: center;
            color: #fff;
            font-size: 9px;
            letter-spacing: 5px;
            text-transform: uppercase;
            outline: none;
            transition: 0.5s;
        }

        .search-capsule:focus {
            width: 450px;
            border-color: var(--pink-neon);
            box-shadow: 0 0 40px rgba(255, 0, 127, 0.2);
        }

        /* Heart Bloom FX */
        .heart-bloom {
            position: absolute;
            color: var(--pink-neon);
            font-size: 120px;
            pointer-events: none;
            z-index: 100;
            animation: bloom 1s forwards;
        }

        @keyframes bloom {
            0% { transform: scale(0) rotate(-20deg); opacity: 0; }
            50% { transform: scale(1.5) rotate(0deg); opacity: 0.8; }
            100% { transform: scale(2.5) rotate(20deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <audio id="clickSfx" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

    <div class="top-nav">
        <input type="text" id="nodeSearch" placeholder="ACCESS ARCHIVE: 001-099" class="search-capsule syncopate font-bold">
    </div>

    <div id="mainScroller" class="scroller">
        </div>

    <script>
        const CLOUD = "dssk5tabb";
        const TOTAL = 99;
        const scroller = document.getElementById('mainScroller');
        const sfx = document.getElementById('clickSfx');

        function buildAether() {
            let html = '';
            for (let i = 1; i <= TOTAL; i++) {
                let id = i.toString().padStart(3, '0');
                let publicID = `${id}_ypq1wb`;
                let videoUrl = `https://res.cloudinary.com/${CLOUD}/video/upload/${publicID}.mp4`;

                html += `
                <section class="node-section" id="v-${id}" ondblclick="bloomHeart(this)">
                    <div class="frame-glow"></div>
                    <video loop playsinline preload="none" onclick="this.paused ? this.play() : this.pause()">
                        <source src="${videoUrl}" type="video/mp4">
                    </video>

                    <div class="side-icons">
                        <div class="crystal-btn"><i class="fa-regular fa-heart"></i></div>
                        <div class="crystal-btn"><i class="fa-solid fa-share-nodes"></i></div>
                        <div class="crystal-btn" onclick="window.open('${videoUrl}')"><i class="fa-solid fa-arrow-down-long"></i></div>
                    </div>

                    <div class="luxury-info">
                        <p class="syncopate text-[8px] tracking-[6px] text-pink-500 mb-2">AETHER NODE ACTIVE</p>
                        <h2 class="syncopate text-xl font-bold italic tracking-tighter uppercase mb-2">CRYSTAL // ${id}</h2>
                        <div class="h-[1px] w-12 bg-pink-500 opacity-50 mb-3"></div>
                        <p class="text-[10px] text-white/30 font-light tracking-[2px]">${publicID}</p>
                    </div>
                </section>
                `;
            }
            scroller.innerHTML = html;
        }

        function bloomHeart(el) {
            const h = document.createElement('i');
            h.className = 'fas fa-heart heart-bloom';
            h.style.left = '50%'; h.style.top = '50%';
            h.style.transform = 'translate(-50%, -50%)';
            el.appendChild(h);
            setTimeout(() => h.remove(), 1000);
        }

        document.getElementById('nodeSearch').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const target = document.getElementById(`v-${e.target.value.padStart(3, '0')}`);
                if (target) target.scrollIntoView({ behavior: 'smooth' });
            }
        });

        buildAether();

        const obs = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const v = entry.target.querySelector('video');
                if (entry.isIntersecting) {
                    v.play();
                    sfx.currentTime = 0; sfx.play();
                } else {
                    v.pause();
                }
            });
        }, { threshold: 0.8 });

        document.querySelectorAll('.node-section').forEach(s => obs.observe(s));
    </script>
</body>
</html>
