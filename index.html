<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STUDIO HOMEWORK | PINK LUXURY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap');

        :root { 
            --pink-main: #ff007f; 
            --pink-glow: rgba(255, 0, 127, 0.6);
            --bg-dark: #050002;
        }

        body, html { 
            margin: 0; padding: 0; background: var(--bg-dark); color: #fff; 
            overflow: hidden; font-family: 'Rajdhani', sans-serif;
            height: 100%; width: 100%;
        }

        .main-scroller { 
            height: 100vh; width: 100vw;
            overflow-y: scroll; scroll-snap-type: y mandatory; 
            scrollbar-width: none;
        }
        .main-scroller::-webkit-scrollbar { display: none; }

        .video-unit { 
            height: 100vh; width: 100vw; scroll-snap-align: start; 
            position: relative; overflow: hidden; background: #000;
            display: flex; align-items: center; justify-content: center;
        }

        /* عرض الفيديو كاملاً بوضوح فائق */
        video { 
            max-width: 100%; max-height: 100%; 
            object-fit: contain; /* يضمن عدم قص أي جزء من الفيديو */
            box-shadow: 0 0 50px rgba(255, 0, 127, 0.1);
        }

        /* واجهة HUD الوردي */
        .pink-ui-frame {
            position: absolute; inset: 20px; border: 1px solid rgba(255, 0, 127, 0.1);
            pointer-events: none; z-index: 10; border-radius: 15px;
        }
        .corner { position: absolute; width: 30px; height: 30px; border: 2px solid var(--pink-main); filter: drop-shadow(0 0 10px var(--pink-main)); }
        .top-left { top: -2px; left: -2px; border-right: 0; border-bottom: 0; }
        .bottom-right { bottom: -2px; right: -2px; border-left: 0; border-top: 0; }

        /* نصوص الواجهة */
        .content-info {
            position: absolute; bottom: 50px; left: 40px; z-index: 100;
            pointer-events: none;
        }
        .studio-label {
            font-family: 'Orbitron'; font-weight: 900; font-size: 9vw;
            line-height: 0.8; text-transform: uppercase;
            background: linear-gradient(to bottom, #fff, var(--pink-main));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px var(--pink-glow));
        }

        /* لودر التحميل الوردي */
        #pink-loader {
            position: fixed; inset: 0; background: var(--bg-dark); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .bar-container { width: 180px; height: 2px; background: rgba(255,0,127,0.05); position: relative; margin-top: 20px; }
        .bar-fill { position: absolute; top: 0; left: 0; height: 100%; background: var(--pink-main); animation: slide 2.5s infinite; shadow: 0 0 10px var(--pink-main); }

        @keyframes slide { 0% { width: 0%; left: 0; } 50% { width: 100%; left: 0; } 100% { width: 0%; left: 100%; } }
    </style>
</head>
<body>

    <div id="pink-loader">
        <div class="text-pink-500 font-black tracking-[10px] animate-pulse text-[10px]" style="font-family: 'Orbitron';">PINK_ACCESS_GRANTED</div>
        <div class="bar-container"><div class="bar-fill"></div></div>
    </div>

    <main class="main-scroller" id="content-engine"></main>

    <script>
        const cloudAccount = "dssk5tabb";
        
        // القائمة المحدثة بالأسماء التي أرسلتها
        const videoIDs = [
            "homework3_e2fj", "homework4_zito", "homework5_eyb", 
            "homework6_gst", "homework7_rgut", "homework8_bd", 
            "homework9_tno", "homework_v2_ja", "homework_v3_z", 
            "29_ypq1wb", "homework10_r", "homework11_w", 
            "homework12_yof", "homework13_ox", "homework14_nl", 
            "homework15_k2", "homework1_pqiu", "homework2_ye4"
        ];

        const engine = document.getElementById('content-engine');

        videoIDs.forEach((id) => {
            const section = document.createElement('section');
            section.className = 'video-unit';
            section.innerHTML = `
                <div class="pink-ui-frame"><div class="corner top-left"></div><div class="corner bottom-right"></div></div>
                <video loop playsinline muted src="https://res.cloudinary.com/${cloudAccount}/video/upload/q_auto:best,f_auto/${id}.mp4"></video>
                <div class="content-info">
                    <div class="text-pink-400 text-[9px] tracking-[5px] mb-3 font-bold">MODE: PINK_ARCHIVE</div>
                    <h2 class="studio-label">STUDIO<br>HOMEWORK</h2>
                    <p class="text-white/20 text-[8px] mt-4 tracking-[3px] uppercase italic">Source_Node: ${id}</p>
                </div>
            `;
            engine.appendChild(section);
        });

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('pink-loader').style.opacity = '0';
                setTimeout(() => document.getElementById('pink-loader').style.display = 'none', 800);
            }, 2000);
            initVideoLogic();
        });

        function initVideoLogic() {
            const obs = new IntersectionObserver((entries) => {
                entries.forEach(e => {
                    const v = e.target.querySelector('video');
                    if (e.isIntersecting) v.play();
                    else { v.pause(); v.currentTime = 0; }
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.video-unit').forEach(u => obs.observe(u));
        }

        // تفعيل الصوت بلمسة واحدة
        window.onclick = () => { document.querySelectorAll('video').forEach(v => v.muted = false); };
    </script>
</body>
</html>
