<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Homework | Infinite Flow</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
            --accent: #00f2ea;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            overflow: hidden; background: #000;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        /* الشعار العلوي */
        .modern-logo {
            position: fixed; top: 25px; right: 25px; z-index: 100;
            background: var(--glass); backdrop-filter: blur(20px);
            padding: 10px 25px; border-radius: 12px;
            border: 1px solid var(--border); color: white;
            font-weight: 200; letter-spacing: 3px; font-size: 0.9em;
        }

        /* حاوية التمرير */
        .feed {
            height: 100vh; overflow-y: scroll;
            snap-type: y mandatory; scroll-behavior: smooth;
        }

        .video-card {
            height: 100vh; width: 100%; snap-align: start;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }

        /* إطار المشغل الزجاجي */
        .player-wrapper {
            width: 85%; height: 85%; border-radius: 35px;
            overflow: hidden; position: relative;
            border: 1px solid var(--border);
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
            background: #050505;
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        /* أدوات التحكم الاحترافية */
        .custom-controls {
            position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 25px; padding: 12px 25px;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(15px);
            border-radius: 50px; border: 1px solid var(--border);
            z-index: 10;
        }

        .control-btn {
            background: none; border: none; color: white;
            cursor: pointer; font-size: 1.2rem; transition: 0.3s;
        }

        .control-btn:hover { color: var(--accent); transform: scale(1.2); }

        /* معلومات الفيديو الجانبية */
        .video-info {
            position: absolute; bottom: 40px; right: 40px;
            color: white; text-align: right; z-index: 5;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        .feed::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="modern-logo">STUDIO HOMEWORK</div>

    <div class="feed" id="mainFeed">
        </div>

    <script>
        const cloudName = "dssk5tabb";
        const suffix = "_ypq1wb";
        const maxLimit = 1000; // الحد الأقصى الذي طلبته
        const feed = document.getElementById('mainFeed');

        // دالة إنشاء المشغل لكل فيديو
        function createPlayer(index) {
            const publicId = `${index}${suffix}`;
            const videoUrl = `https://res.cloudinary.com/${cloudName}/video/upload/f_auto,q_auto/${publicId}.mp4`;

            const card = document.createElement('div');
            card.className = 'video-card';
            card.dataset.index = index;
            card.innerHTML = `
                <div class="player-wrapper">
                    <video id="vid-${index}" loop playsinline muted>
                        <source src="${videoUrl}" type="video/mp4">
                    </video>
                    <div class="custom-controls">
                        <button class="control-btn" onclick="playPause(${index})">⏯️</button>
                        <button class="control-btn" onclick="muteUnmute(${index})">🔊</button>
                        <button class="control-btn" onclick="fullScreen(${index})">📺</button>
                    </div>
                </div>
                <div class="video-info">
                    <div style="font-size: 0.7rem; color: var(--accent); letter-spacing: 2px;">ARCHIVE</div>
                    <div style="font-size: 1.5rem; font-weight: 200;">Piece #${index}</div>
                </div>
            `;
            feed.appendChild(card);
            observer.observe(card);
        }

        // وظائف التحكم
        window.playPause = (id) => { const v = document.getElementById(`vid-${id}`); v.paused ? v.play() : v.pause(); };
        window.muteUnmute = (id) => { const v = document.getElementById(`vid-${id}`); v.muted = !v.muted; };
        window.fullScreen = (id) => { const v = document.getElementById(`vid-${id}`); v.requestFullscreen?.(); };

        // نظام المراقبة للتشغيل التلقائي
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const video = entry.target.querySelector('video');
                if (entry.isIntersecting) {
                    video.play().catch(() => {});
                } else {
                    video.pause();
                }
            });
        }, { threshold: 0.7 });

        // تشغيل نظام التحميل الذكي (سيبحث حتى يجد آخر فيديو مرفوع أو يصل لـ 1000)
        async function loadAll() {
            for (let i = 1; i <= maxLimit; i++) {
                // ملاحظة: لتحسين السرعة، نقوم بإنشاء المشغلات مباشرة.
                // المتصفح سيقوم بتحميل الفيديوهات التي تظهر أمام المستخدم فقط (Lazy Loading).
                createPlayer(i);
            }
        }

        // تفعيل الصوت عند أول تفاعل
        document.addEventListener('click', () => {
            document.querySelectorAll('video').forEach(v => v.muted = false);
        }, { once: true });

        loadAll();
    </script>
</body>
</html>
