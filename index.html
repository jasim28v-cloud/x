<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHΔDØW ARCHIVE | DYNAMIC FEED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;700&display=swap');

        :root { --neon: #00f3ff; --dark: #000000; }

        body, html { 
            margin: 0; padding: 0; background: var(--dark); color: #fff; 
            overflow: hidden; font-family: 'Rajdhani', sans-serif;
            height: 100%; width: 100%;
        }

        /* SCROLL ENGINE V99 */
        .main-scroller { 
            height: 100vh; width: 100vw;
            overflow-y: scroll; scroll-snap-type: y mandatory; 
            scrollbar-width: none; scroll-behavior: smooth;
        }
        .main-scroller::-webkit-scrollbar { display: none; }

        .video-section { 
            height: 100vh; width: 100vw; scroll-snap-align: start; 
            position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;
        }

        video { 
            position: absolute; inset: 0; width: 100%; height: 100%; 
            object-fit: cover; filter: brightness(0.4) grayscale(0.2); 
            transition: 1.5s transform cubic-bezier(0.1, 0.7, 0.1, 1);
        }

        .video-section:hover video { filter: brightness(0.6); transform: scale(1.05); }

        /* HUD ELEMENTS */
        .hud-frame {
            position: absolute; inset: 30px; border: 1px solid rgba(0, 243, 255, 0.1);
            pointer-events: none; z-index: 10; border-radius: 20px;
        }

        .info-overlay {
            position: absolute; bottom: 80px; left: 50px; z-index: 100;
            pointer-events: none;
        }

        .stream-id {
            font-family: 'Orbitron'; color: var(--neon); font-size: 10px;
            letter-spacing: 5px; border-left: 3px solid var(--neon); padding-left: 15px;
            margin-bottom: 15px; text-transform: uppercase;
        }

        .main-title {
            font-family: 'Orbitron'; font-weight: 900; font-size: clamp(3rem, 10vw, 6rem);
            line-height: 1; background: linear-gradient(to bottom, #fff, #444);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* DYNAMIC LOADER */
        #loader {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="text-cyan-400 font-black tracking-[15px] animate-pulse text-[10px]">LOADING_COLLECTION</div>
    </div>

    <header class="fixed top-0 w-full z-[1000] p-10 flex justify-between items-center pointer-events-none">
        <div class="text-xl font-black tracking-widest" style="font-family: 'Orbitron';">EMPIRE<span class="text-cyan-400">.27</span></div>
        <div id="clock" class="text-[10px] text-cyan-400/50 font-mono tracking-widest uppercase">Initializing...</div>
    </header>

    <main class="main-scroller" id="content-engine"></main>

    <script>
        const cloudID = "dssk5tabb";
        
        // هنا تضع فقط الأكواد (Public IDs) من الرابط الذي أرسلته
        // الكود سيقوم بتوزيعها تلقائياً بدون الحاجة لتسمية كل فيديو
        const assets = [
            "20_xfje8w", "21_w4wece", "23_a80hnj", 
            "24_biyybp", "25_hijmjm", "26_vdqhwz", 
            "28_yra4wi", "29_ypq1wb"
        ];

        const engine = document.getElementById('content-engine');

        // محرك الحقن التلقائي - لا يركز على الأسماء بل على المعرفات
        assets.forEach((id, index) => {
            const section = document.createElement('section');
            section.className = 'video-section';
            section.innerHTML = `
                <div class="hud-frame"></div>
                <video loop playsinline muted preload="metadata">
                    <source src="https://res.cloudinary.com/${cloudID}/video/upload/q_auto,f_auto/${id}.mp4" type="video/mp4">
                </video>
                <div class="info-overlay">
                    <div class="stream-id">DATA_STREAM_${(index + 1).toString().padStart(2, '0')}</div>
                    <h2 class="main-title">SHADOW<br>ARCHIVE</h2>
                    <p class="text-white/20 text-[9px] mt-4 tracking-[5px] uppercase">Source_ID: ${id}</p>
                </div>
            `;
            engine.appendChild(section);
        });

        // نظام التحكم في التشغيل (Intersection Observer)
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const vid = entry.target.querySelector('video');
                if (entry.isIntersecting) vid.play();
                else { vid.pause(); vid.currentTime = 0; }
            });
        }, { threshold: 0.7 });

        document.querySelectorAll('.video-section').forEach(s => observer.observe(s));

        // إخفاء التحميل
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
            }, 2000);
        };

        // تفعيل الصوت
        window.onclick = () => { document.querySelectorAll('video').forEach(v => v.muted = false); };

        // تحديث الساعة
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString() + " // SYSTEM_ALIVE";
        }, 1000);
    </script>
</body>
</html>
