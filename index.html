<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>v2rayx | Luxury Cinematic Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #fe2c55;
            --gold: #ffd700;
            --glass-vibe: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(254, 44, 85, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000;
            font-family: 'Poppins', sans-serif;
            color: #fff;
            overflow: hidden; /* Full-screen experience */
        }

        /* Cinematic Film Grain Overlay */
        .film-grain {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Grain.png');
            opacity: 0.04; pointer-events: none; z-index: 5000;
        }

        /* Glass Header with Live Clock */
        header {
            position: fixed; top: 0; width: 100%; height: 90px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; z-index: 2000;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--glass-border);
        }

        .logo-section { display: flex; flex-direction: column; }
        .logo { font-size: 2.6rem; font-weight: 900; text-shadow: 0 0 20px var(--neon-pink); letter-spacing: -2px; }
        #digital-clock { font-size: 1.1rem; color: var(--neon-pink); font-weight: 300; letter-spacing: 2px; }

        /* Massive Video Feed System */
        .video-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .video-box { position: relative; height: 100vh; width: 100%; scroll-snap-align: start; display: flex; justify-content: center; align-items: center; background: #000; }
        
        video { height: 100%; width: 100%; max-width: 480px; object-fit: cover; border-radius: 30px; border: 1px solid var(--glass-border); }

        /* Trending Tag */
        .trending-badge {
            position: absolute; top: 110px; left: 20px;
            background: linear-gradient(45deg, var(--neon-pink), #ff85a1);
            padding: 6px 18px; border-radius: 25px; font-weight: 800; font-size: 0.75rem;
            animation: glow-pulse 1.5s infinite; z-index: 1000;
        }

        @keyframes glow-pulse { 0%, 100% { opacity: 0.7; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); box-shadow: 0 0 20px var(--neon-pink); } }

        /* Floating Live Comments System */
        .comment-stream {
            position: absolute; left: 20px; bottom: 180px; width: 260px;
            height: 160px; overflow: hidden; pointer-events: none; z-index: 1000;
        }
        .msg {
            background: rgba(255,255,255,0.12); backdrop-filter: blur(8px);
            padding: 6px 14px; border-radius: 18px; margin-bottom: 10px;
            font-size: 0.85rem; border-left: 3px solid var(--neon-pink);
            animation: slide-up 4s forwards; position: absolute; bottom: -50px;
        }
        @keyframes slide-up { to { bottom: 250px; opacity: 0; } }

        /* Interaction Sidebar with Real Share/Likes */
        .sidebar { position: absolute; right: 20px; bottom: 130px; display: flex; flex-direction: column; gap: 28px; z-index: 1000; }
        .btn-circle { width: 62px; height: 62px; background: var(--glass-vibe); border: 1px solid var(--glass-border); border-radius: 50%; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(15px); font-size: 1.5rem; cursor: pointer; transition: 0.3s; position: relative; }
        .btn-circle:hover { background: var(--neon-pink); border-color: #fff; box-shadow: 0 0 25px var(--neon-pink); }
        .liked .btn-circle { background: var(--neon-pink); border-color: #fff; animation: pop 0.4s ease; }
        @keyframes pop { 50% { transform: scale(1.3); } }

        /* Heart Sparks Animation */
        .sparkle { position: absolute; color: var(--neon-pink); pointer-events: none; animation: fly-away 0.8s forwards; }
        @keyframes fly-away { to { transform: translateY(-120px) translateX(20px) scale(1.6); opacity: 0; } }

        /* Info & Badges */
        .video-info { position: absolute; bottom: 40px; left: 25px; z-index: 1000; }
        .views-tag { background: rgba(254, 44, 85, 0.3); padding: 5px 15px; border-radius: 25px; font-size: 0.8rem; border: 1px solid var(--neon-pink); display: inline-block; margin-bottom: 12px; }

        /* Glowing Progress Line */
        .progress-container { position: absolute; bottom: 0; width: 100%; height: 6px; background: rgba(255,255,255,0.1); }
        .progress-bar { height: 100%; width: 0%; background: var(--neon-pink); box-shadow: 0 0 15px var(--neon-pink); }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="film-grain"></div>

    <header>
        <div class="logo-section">
            <div class="logo">v2rayx</div>
            <div id="digital-clock">00:00:00</div>
        </div>
        <div style="color: var(--gold); font-weight: 900; font-size: 0.75rem; letter-spacing: 3px; border: 1px solid var(--gold); padding: 5px 12px; border-radius: 10px;">ULTRA LUXURY</div>
    </header>

    <div class="video-feed" id="mainFeed"></div>

    <script>
        // Update Live Clock
        function updateClock() { document.getElementById('digital-clock').textContent = new Date().toLocaleTimeString(); }
        setInterval(updateClock, 1000); updateClock();

        const feed = document.getElementById('mainFeed');
        const comments = ["Masterpiece! 💎", "v2rayx is stunning! 🔥", "That glass UI... wow ✨", "Ultra luxury vibe ❤️", "Best cinematic feed ever 🚀", "I love v2rayx! 🌸"];

        // Real System Share
        async function v2Share() {
            try { await navigator.share({title: 'v2rayx', url: window.location.href}); } 
            catch { navigator.clipboard.writeText(window.location.href); alert("Link Copied!"); }
        }

        // Real Like Interaction
        function handleLike(btn) {
            btn.parentElement.classList.toggle('liked');
            let count = btn.nextElementSibling;
            let val = parseFloat(count.textContent);
            count.textContent = btn.parentElement.classList.contains('liked') ? (val + 0.1).toFixed(1) + "K" : (val - 0.1).toFixed(1) + "K";
            
            for(let i=0; i<6; i++) {
                const s = document.createElement('div');
                s.className = 'sparkle'; s.textContent = '❤️';
                s.style.left = (Math.random() * 40 - 20) + "px";
                btn.appendChild(s);
                setTimeout(() => s.remove(), 800);
            }
        }

        // Automatic 999 Video Generation Logic
        for (let i = 1; i <= 999; i++) {
            let num = i.toString().padStart(2, '0');
            const videoId = `${num}_Itzbic`; // Matching your naming convention
            const views = (Math.floor(Math.random() * 850) + 100) + "K";
            const likes = (Math.floor(Math.random() * 120) + 20) + ".5K";

            const item = document.createElement('div');
            item.className = 'video-box';
            item.innerHTML = `
                <div class="trending-badge">🔥 VIRAL #${i}</div>
                <video src="https://res.cloudinary.com/dssk5tabb/video/upload/q_auto,f_auto/${videoId}.mp4" loop playsinline></video>
                <div class="comment-stream"></div>
                <div class="sidebar">
                    <div class="action-item"><div class="btn-circle" onclick="handleLike(this)">❤️</div><span style="font-size:0.8rem; margin-top:5px; text-align:center;">${likes}</span></div>
                    <div class="action-item"><div class="btn-circle">💬</div><span style="font-size:0.8rem; margin-top:5px; text-align:center;">${Math.floor(Math.random()*800)}</span></div>
                    <div class="action-item" onclick="v2Share()"><div class="btn-circle">🔗</div><span style="font-size:0.8rem; margin-top:5px; text-align:center;">Share</span></div>
                </div>
                <div class="video-info">
                    <div class="views-tag">👁️ ${views} views</div>
                    <h3 style="color:var(--neon-pink); font-size:1.7rem; font-weight:900;">@v2rayx_official</h3>
                    <p style="opacity:0.8; font-size:0.9rem;">Exclusive Content: ${videoId}</p>
                </div>
                <div class="progress-container"><div class="progress-bar"></div></div>
            `;
            
            const v = item.querySelector('video');
            const fill = item.querySelector('.progress-bar');

            // Floating Comments Injector
            setInterval(() => {
                if(item.dataset.active === "true") {
                    const c = document.createElement('div');
                    c.className = 'msg';
                    c.textContent = comments[Math.floor(Math.random()*comments.length)];
                    item.querySelector('.comment-stream').appendChild(c);
                    setTimeout(() => c.remove(), 4000);
                }
            }, 2500);

            v.ontimeupdate = () => { fill.style.width = (v.currentTime / v.duration) * 100 + "%"; };
            item.onclick = (e) => { if(e.target.tagName !== 'DIV' && e.target.tagName !== 'SPAN') v.paused ? v.play() : v.pause(); };
            feed.appendChild(item);
        }

        // Optimized Intersection Observer for Performance
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const v = entry.target.querySelector('video');
                if (entry.isIntersecting) {
                    v.play().catch(()=>{}); entry.target.dataset.active = "true";
                } else {
                    v.pause(); v.currentTime = 0; entry.target.dataset.active = "false";
                }
            });
        }, { threshold: 0.7 });
        document.querySelectorAll('.video-box').forEach(box => observer.observe(box));
    </script>
</body>
</html>
