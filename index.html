<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS VAULT | CLOUD STORAGE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Plus+Jakarta+Sans:wght@300;700&display=swap');

        :root {
            --glass-bg: rgba(255, 255, 255, 0.01);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-blue: #3b82f6;
        }

        body {
            background: #030509;
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .mesh-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 10%, #1e293b 0%, transparent 35%),
                        radial-gradient(circle at 90% 90%, #0f172a 0%, transparent 35%);
            z-index: -1;
        }

        .glass-container {
            background: var(--glass-bg);
            backdrop-filter: blur(30px) saturate(150%);
            border: 1px solid var(--glass-border);
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .glass-container:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: var(--accent-blue);
            transform: translateY(-8px);
        }

        .orbitron { font-family: 'Orbitron', sans-serif; }

        video {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            border-radius: 20px 20px 0 0;
            background: #000;
        }

        .search-field {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            transition: 0.4s;
        }

        .search-field:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.15);
            outline: none;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="mesh-bg"></div>

    <header class="container mx-auto px-6 py-16 flex flex-col items-center">
        <div class="text-center mb-12">
            <h1 class="orbitron text-4xl md:text-5xl font-black tracking-[0.5em] text-blue-500 mb-3">VAULT<span class="text-white">NODE</span></h1>
            <p class="text-[10px] orbitron tracking-[1em] text-gray-600 uppercase">Cloud Repository: dssk5tabb</p>
        </div>

        <div class="relative w-full max-w-2xl">
            <i class="fas fa-barcode absolute left-6 top-1/2 -translate-y-1/2 text-blue-500"></i>
            <input type="text" id="searchInput" placeholder="SCAN INDEX (001-099)..." 
                   class="search-field w-full py-5 pl-16 pr-8 text-xs orbitron tracking-widest uppercase">
        </div>
    </header>

    <main class="container mx-auto px-6 pb-40">
        <div id="galleryGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-10">
            </div>
    </main>

    <script>
        const CLOUD_NAME = "dssk5tabb";
        
        const initSequence = () => {
            let data = [];
            for (let i = 1; i <= 99; i++) {
                let id = i.toString().padStart(3, '0');
                data.push(`${id}_ypq1wb`);
            }
            return data;
        };

        const vaultData = initSequence();
        const grid = document.getElementById('galleryGrid');
        const search = document.getElementById('searchInput');

        function render(items) {
            grid.innerHTML = items.map(id => {
                const streamUrl = `https://res.cloudinary.com/${CLOUD_NAME}/video/upload/${id}.mp4`;
                const thumbUrl = `https://res.cloudinary.com/${CLOUD_NAME}/video/upload/${id}.jpg`;
                const tag = id.split('_')[0];

                return `
                <div class="glass-container rounded-[30px] overflow-hidden">
                    <div class="relative">
                        <video poster="${thumbUrl}" preload="none" controls>
                            <source src="${streamUrl}" type="video/mp4">
                        </video>
                        <div class="absolute top-4 left-4 glass-container border-none px-3 py-1 rounded-lg">
                            <span class="text-[9px] font-black orbitron text-blue-400 tracking-widest">IDX-${tag}</span>
                        </div>
                    </div>
                    <div class="p-6">
                        <div class="flex justify-between items-center mb-5">
                            <h3 class="text-[10px] orbitron text-gray-500 tracking-tighter truncate">${id}</h3>
                            <div class="w-1.5 h-1.5 rounded-full bg-blue-500 shadow-[0_0_8px_#3b82f6]"></div>
                        </div>
                        <a href="${streamUrl}" target="_blank" class="block w-full text-center py-3 glass-container border-white/5 text-[9px] orbitron font-black uppercase tracking-widest hover:bg-blue-600 transition-all">
                            Direct Source
                        </a>
                    </div>
                </div>
                `;
            }).join('');
        }

        search.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = vaultData.filter(id => id.includes(val));
            render(filtered);
        });

        render(vaultData);
    </script>
</body>
</html>
