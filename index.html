<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STUDIO HOMEWORK | EMPIRE 2027</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');

        :root { --neon: #00f3ff; --shadow-dark: #050505; }

        body, html { 
            margin: 0; padding: 0; background: var(--shadow-dark); color: #fff; 
            overflow: hidden; font-family: 'Rajdhani', sans-serif;
            height: 100%; width: 100%;
        }

        /* V99 SCROLL ENGINE */
        .main-scroller { 
            height: 100vh; width: 100vw;
            overflow-y: scroll; scroll-snap-type: y mandatory; 
            scrollbar-width: none; scroll-behavior: smooth;
        }
        .main-scroller::-webkit-scrollbar { display: none; }

        .video-section { 
            height: 100vh; width: 100vw; scroll-snap-align: start; 
            position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;
        }

        /* BACKGROUND CORE */
        .video-bg { position: absolute; inset: 0; z-index: 1; transition: transform 1.5s cubic-bezier(0.1, 0.7, 0.1, 1); }
        video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4) contrast(1.2); transition: 1s ease; }
        .video-section:hover video { filter: brightness(0.6); transform: scale(1.05); }

        /* HUD OVERLAY */
        .hud-overlay {
            position: absolute; inset: 25px; border: 1px solid rgba(0, 243, 255, 0.08);
            pointer-events: none; z-index: 10; border-radius: 20px;
        }
        .corner { position: absolute; width: 35px; height: 35px; border: 2px solid var(--neon); filter: drop-shadow(0 0 12px var(--neon)); opacity: 0.6; }
        .t-l { top: -2px; left: -2px; border-right: 0; border-bottom: 0; border-top-left-radius: 15px; }
        .b-r { bottom: -2px; right: -2px; border-left: 0; border-top: 0; border-bottom-right-radius: 15px; }

        /* INFORMATION PANEL */
        .info-panel {
            position: absolute; bottom: 80px; left: 60px; z-index: 100;
            text-align: left; pointer-events: none;
        }
        .node-tag {
            background: rgba(0, 243, 255, 0.1); border-left: 4px solid var(--neon);
            color: var(--neon); padding: 5px 15px; font-size: 10px;
            letter-spacing: 4px; font-family: 'Orbitron'; margin-bottom: 20px; display: inline-block;
        }
        .main-title {
            font-family: 'Orbitron'; font-weight: 900; font-size: clamp(3rem, 12vw, 6rem);
            line-height: 0.8; text-transform: uppercase; letter-spacing: -3px;
            background: linear-gradient(to right, #ffffff, #444444);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* V99 LOADER */
        #loader {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .loading-text { font-family: 'Orbitron'; font-size: 11px; letter-spacing: 12px; color: var(--neon); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loading-text">SYNCING_SHADOW_CORE</div>
        <div class="w-40 h-[1px] bg-white/10 mt-6 relative overflow-hidden">
            <div class="absolute inset-0 bg-cyan-500 w-full animate-[loading_2s_ease-in-out_infinite]"></div>
        </div>
    </div>

    <header class="fixed top-0 w-full z-[1000] p-10 flex justify-between items-start pointer-events-none">
        <div class="flex items-center gap-6">
            <div class="w-1 h-12 bg-cyan-400 shadow-[0_0_15px_#00f3ff]"></div>
            <div>
                <h1 class="font-black text-2xl tracking-tighter" style="font-family: 'Orbitron';">STUDIO<span class="text-cyan-400">.HW</span></h1>
                <div id="live-clock" class="text-[9px] text-white/40 tracking-[5px] mt-1">00:00:00 // SYSTEM_READY</div>
            </div>
        </div>
        <div class="text-right">
            <div class="px-5 py-1.5 border border-cyan-500/30 rounded-sm bg-black/60 text-[9px] text-cyan-400 uppercase tracking-[4px]">V99 Protocol</div>
        </div>
    </header>

    <main class="main-scroller" id="content-engine"></main>

    <script>
        const cloudID = "dssk5tabb";
        // Optimized order based on your collection link
        const videoArchive = [
            "20_xfje8w", "21_w4wece", "23_a80hnj", 
            "24_biyybp", "25_hijmjm", "26_vdqhwz", 
            "28_yra4wi", "29_ypq1wb"
        ];

        const engine = document.getElementById('content-engine');

        videoArchive.forEach((id, index) => {
            const section = document.createElement('section');
            section.className = 'video-section';
            section.innerHTML = `
                <div class="hud-overlay"><div class="corner t-l"></div><div class="corner b-r"></div></div>
                <div class="video-bg">
                    <video loop playsinline muted preload="auto">
                         <source src="https://res.cloudinary.com/${cloudID}/video/upload/q_auto,f_auto/${id}.mp4" type="video/mp4">
                    </video>
                </div>
                <div class="info-panel">
                    <div class="node-tag">NODE_0${index + 1} // SECURE</div>
                    <h2 class="main-title">SHADOW<br>ARCHIVE</h2>
                    <p class="text-white/30 text-[9px] mt-8 tracking-[10px] uppercase font-bold">DATA_STREAM: ${id}</p>
                </div>
            `;
            engine.appendChild(section);
        });

        // SYSTEM INITIALIZATION
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 1000);
            }, 2500);
            
            const obs = new IntersectionObserver((entries) => {
                entries.forEach(e => {
                    const vid = e.target.querySelector('video');
                    if (e.isIntersecting) {
                        vid.play();
                        e.target.querySelector('.video-bg').style.transform = "scale(1)";
                    } else {
                        vid.pause();
                        e.target.querySelector('.video-bg').style.transform = "scale(1.1)";
                    }
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.video-section').forEach(s => obs.observe(s));
        });

        // AUDIO UNLOCK PROTOCOL
        window.onclick = () => { 
            document.querySelectorAll('video').forEach(v => v.muted = false);
        };

        // REAL-TIME SYSTEM CLOCK
        setInterval(() => {
            const now = new Date();
            document.getElementById('live-clock').innerText = 
                now.getHours().toString().padStart(2, '0') + ":" + 
                now.getMinutes().toString().padStart(2, '0') + ":" + 
                now.getSeconds().toString().padStart(2, '0') + " // SYSTEM_ACTIVE";
        }, 1000);
    </script>
</body>
</html>
